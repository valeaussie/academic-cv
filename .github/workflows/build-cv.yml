name: Build and publish CV

on:
  push:
    branches:
      - main
    paths:
      - "cv.tex"
      - "citations.bib"
      - "Makefile"
      - "index.html"
      - ".github/workflows/build-cv.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            biber \
            texlive-bibtex-extra \
            texlive-fonts-extra \
            texlive-latex-extra

      - name: Compile CV
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error cv.tex

      - name: Prepare website
        run: |
          mkdir _site
          cp cv.pdf _site/cv.pdf
          cp index.html _site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages files
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
